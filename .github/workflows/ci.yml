---
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow other workflows to invoke this one. The Galaxy publish workflow
  # calls it so a release can only publish when CI is green.
  workflow_call:
  # Weekly run so breakage from the moving ansible-core "devel" branch (a new
  # Python floor or new sanity rules) is caught even without a push.
  schedule:
    - cron: '0 6 * * 1'

jobs:
  sanity:
    name: Sanity (Ansible ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ansible-core 2.16 / 2.17 require Python 3.10+, 2.18 requires
        # 3.11+. The devel branch raises its Python floor over time, so it
        # tracks the latest stable Python ('3.x') rather than a pinned value.
        # ansible-core 2.15 reached EOL November 2024 and is no longer tested.
        include:
          - ansible: stable-2.16
            python: '3.11'
          - ansible: stable-2.17
            python: '3.11'
          - ansible: stable-2.18
            python: '3.11'
          - ansible: devel
            python: '3.x'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: ansible_collections/cisco/gnmi

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core (${{ matrix.ansible }})
        run: pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible }}.tar.gz

      - name: Install collection dependencies
        run: pip install grpcio grpcio-tools protobuf cryptography

      - name: Run sanity tests
        run: ansible-test sanity --docker default -v --color
        working-directory: ansible_collections/cisco/gnmi

  units:
    name: Unit tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Python 3.9 reached EOL in October 2025 and is no longer tested.
        python:
          - '3.10'
          - '3.11'
          - '3.12'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: ansible_collections/cisco/gnmi

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          pip install ansible-core pytest pytest-cov
          pip install grpcio grpcio-tools protobuf cryptography

      - name: Run unit tests
        # The tests import from ``ansible_collections.cisco.gnmi.*``, so the
        # parent of the ``ansible_collections`` directory (the workspace
        # root) must be on PYTHONPATH for those imports to resolve.
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/unit/ -v --tb=short
        working-directory: ansible_collections/cisco/gnmi

  integration:
    name: Integration tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python:
          - '3.11'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          path: ansible_collections/cisco/gnmi

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Run integration tests
        # The gNOI integration target exercises argument validation, the
        # destructive-operation confirm gate, and the check-mode
        # short-circuit without contacting a device (the gRPC channel is
        # created lazily, so no RPC is sent). ansible-test installs the gRPC
        # runtime from tests/integration/requirements.txt into its venv.
        run: ansible-test integration gnoi --venv -v --color
        working-directory: ansible_collections/cisco/gnmi

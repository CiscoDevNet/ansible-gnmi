---
name: Publish to Ansible Galaxy

on:
  release:
    types: ['created']

jobs:
  # Run the full CI suite (sanity, unit, integration) first. Galaxy releases
  # are immutable, so publishing must only happen on a green run.
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish Collection to Galaxy
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: true
          fetch-depth: 0

      - name: Publish Collection to Galaxy-NG
        uses: ansible/ansible-publish-action@a56a0328c92c1d4feedf5bd7f7cf7ec7a4ae3f09 # v1.0.0
        with:
          api_key: "${{ secrets.GALAXY_API_KEY }}"

[defaults]
inventory = ./inventory/inventory.ini
host_key_checking = False
stdout_callback = yaml
# Show task timing so streaming/Subscribe durations are easy to read
callbacks_enabled = ansible.posix.profile_tasks
retry_files_enabled = False
# Devices are reached directly over gRPC from the controller, so we never SSH.
# Each play also sets connection: local, this is just a safe default.
gathering = explicit

[ssh_connection]
pipelining = True

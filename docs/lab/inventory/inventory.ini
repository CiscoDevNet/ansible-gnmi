# gNMI / gNOI lab inventory
#
# Three Cisco IOS XE devices reached directly over gRPC (gNMI port 9339).
# Connection is "local" because the modules open a gRPC channel from the
# controller, they do NOT SSH into the device.
#
# Usage:
#   ansible-playbook playbooks/01_get.yml
# (ansible.cfg already points -i at this file)

[gnmi_devices]
device1 ansible_host=10.1.1.5
device2 ansible_host=10.1.1.15
device3 ansible_host=10.1.1.55

[gnmi_devices:vars]
ansible_connection=local
# Use the lab venv so the gRPC/TLS Python deps are importable by the modules.
# Resolves to "<this lab dir>/venv" as long as you run playbooks from the lab
# directory (see LAB_GUIDE.md, Step 0, which creates the venv right here).
ansible_python_interpreter={{ lookup('env', 'PWD') }}/venv/bin/python

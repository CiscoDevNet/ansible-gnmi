---
# group_vars/iosxe_devices.yml
# Common variables for all gNMI-capable devices
#
# This file is automatically loaded when you target the 'iosxe_devices' group.
# Best practice: Store credentials, certificates, and connection settings here.

# gNMI Connection Settings
gnmi_port: 9339
gnmi_timeout: 30
gnmi_encoding: json_ietf

# Authentication
gnmi_username: admin
# Password should be encrypted with ansible-vault:
# ansible-vault encrypt_string 'YOUR_PASSWORD_HERE' --name 'gnmi_password'
gnmi_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          # This is a placeholder - replace with actual vaulted password
          # Run: ansible-vault encrypt_string 'YOUR_PASSWORD_HERE' --name 'gnmi_password'

# TLS/SSL Certificate Settings
# Option 1: Use a common CA certificate for all devices
gnmi_ca_cert: /etc/ssl/certs/cisco-ca.pem

# Option 2: Use device-specific certificates (override in host_vars)
# gnmi_ca_cert: "{{ playbook_dir }}/certs/{{ inventory_hostname }}-cert.pem"

# Option 3: Client certificate for mutual TLS (if required)
# gnmi_client_cert: /etc/ssl/certs/ansible-client.pem
# gnmi_client_key: /etc/ssl/private/ansible-client-key.pem

# Security Mode
# Set to true only for testing/lab environments with self-signed certs
gnmi_insecure: false

# TLS skip-verify (Trust-On-First-Use)
# When true (and no gnmi_ca_cert is set), the modules establish a TLS-encrypted
# channel and trust whatever certificate the device presents on first connect,
# WITHOUT verifying it against a CA. This is the easy way to talk to the secure
# port (9339) of devices that use self-signed certificates (as IOS XE does by
# default) without exporting and managing each device's CA.
#
# The channel is encrypted, but the server identity is NOT verified, so it is
# vulnerable to man-in-the-middle attacks. Use it only on trusted networks.
# For production, pin the CA with gnmi_ca_cert instead. An explicit gnmi_ca_cert
# always takes precedence over this setting.
gnmi_tls_skip_verify: false

# Ansible Connection Settings
ansible_connection: local
ansible_python_interpreter: "{{ ansible_playbook_python }}"

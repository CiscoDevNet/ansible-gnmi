# Ansible inventory file for Cisco IOS XE gNMI examples
#
# Usage: ansible-playbook -i inventory.ini playbook.yml

[iosxe_devices]
# Add your Cisco IOS XE devices here
192.168.1.1 ansible_host=192.168.1.1
# 192.168.1.2 ansible_host=192.168.1.2
# 192.168.1.3 ansible_host=192.168.1.3

[iosxe_devices:vars]
# Connection type for network devices
ansible_connection=local
ansible_python_interpreter=/usr/bin/python3

# gNMI connection parameters
gnmi_port=9339
gnmi_timeout=30
gnmi_encoding=json_ietf

# TLS settings
# gnmi_ca_cert=/path/to/ca.pem
# gnmi_client_cert=/path/to/client.pem
# gnmi_client_key=/path/to/client-key.pem
gnmi_insecure=false

[core_routers]
192.168.1.1

[access_switches]
# 192.168.1.10
# 192.168.1.11

[all:vars]
# Global variables
ansible_user=admin
# ansible_password=cisco123  # Better to use ansible-vault

# Ansible inventory file for gNMI with TLS certificates
#
# Best Practice: Define certificates once per device or group
# Usage: ansible-playbook -i inventory_with_certs.ini playbook.yml

[iosxe_devices]
# Define each device with its specific certificate
router1 ansible_host=198.51.100.1 gnmi_ca_cert=/etc/ssl/certs/router1-cert.pem
router2 ansible_host=198.51.100.2 gnmi_ca_cert=/etc/ssl/certs/router2-cert.pem
switch1 ansible_host=192.168.1.10 gnmi_ca_cert=/etc/ssl/certs/switch1-cert.pem

# Or use a shared certificate for all devices signed by same CA
# router1 ansible_host=198.51.100.1
# router2 ansible_host=198.51.100.2

[iosxe_devices:vars]
# Common gNMI connection parameters (applied to all devices in group)
ansible_connection=local
ansible_python_interpreter=/usr/bin/python3

# gNMI settings
gnmi_port=9339
gnmi_timeout=30
gnmi_encoding=json_ietf

# Common CA certificate (if all devices use same CA)
gnmi_ca_cert=/etc/ssl/certs/cisco-ca.pem

# For mutual TLS (client certificate authentication)
# gnmi_client_cert=/etc/ssl/certs/ansible-client.pem
# gnmi_client_key=/etc/ssl/private/ansible-client-key.pem

# Authentication
gnmi_username=admin
# gnmi_password should be in vault (see group_vars example)

# TLS mode
gnmi_insecure=false    # Set to true only for testing with self-signed certs

[production:children]
iosxe_devices

[production:vars]
# Production uses proper certificates
gnmi_insecure=false

[lab:children]
# Define lab group if needed

[lab:vars]
# Lab can use insecure mode for testing
gnmi_insecure=true
# Override to not require ca_cert in lab
gnmi_ca_cert=

[all:vars]
# Global variables for all devices
ansible_user=admin

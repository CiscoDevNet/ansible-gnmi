description: >-
  Ansible collection for Cisco IOS XE gNMI (gRPC Network Management Interface) operations.
  Provides comprehensive support for GET and SET operations using OpenConfig,
  Cisco Native YANG, IETF, and SNMP MIB models. Production-ready with TLS support,
  multi-device management, and extensive examples.

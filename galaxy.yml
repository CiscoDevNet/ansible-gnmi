---
namespace: cisco
name: gnmi
version: 2.0.0
readme: README.md
authors:
  - Jeremy Cohoe <jcohoe@cisco.com>
description: >-
  Ansible collection for vendor-neutral gNMI (gRPC Network Management Interface) operations.
  Supports GET, SET, and Subscribe RPCs on any gNMI-capable device including
  Cisco IOS XE, IOS XR, NX-OS, Nokia SR OS, Arista EOS, and Juniper Junos.
  Production-ready with TLS support, check/diff mode, configuration backup,
  and multi-device management.
license_file: LICENSE
tags:
  - cisco
  - gnmi
  - grpc
  - networking
  - yang
  - openconfig
  - telemetry
  - automation
  - network
dependencies: {}
repository: https://github.com/jeremycohoe/ansible-gnmi
documentation: https://github.com/jeremycohoe/ansible-gnmi/blob/main/README.md
homepage: https://github.com/jeremycohoe/ansible-gnmi
issues: https://github.com/jeremycohoe/ansible-gnmi/issues
build_ignore:
  - '*.tar.gz'
  - .git
  - .github
  - .gitignore
  - __pycache__
  - '*.pyc'
  - .vscode
  - venv
  - .pytest_cache
  - tests
  - test_*.yml
  - test_*.ini
  - test_inventory.ini
  - pytest.ini
  - requirements.txt
  - fix_quotes.py
  - validate_collection.py
  - install.sh
  - verify.sh
  - Makefile
  - fetch_device_cert.sh
  - host_vars
  - CONTRIBUTING.md
  - CODE_REVIEW.md
  - DEMO_SUMMARY.md
  - PROJECT_SUMMARY.md
  - CERTIFICATES_AND_CREDENTIALS.md
  - CISCO_GNMI_CAVEATS.md
  - PLAYBOOK_DOCS.md
  - htmlcov
  - .coverage

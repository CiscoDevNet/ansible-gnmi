---
# Multi-device test playbook for Cisco IOS XE gNMI
- name: Test Multiple Cisco IOS XE Devices via gNMI
  hosts: iosxe_devices
  gather_facts: false

  tasks:
    - name: Get system hostname
      cisco.iosxe_gnmi.cisco_iosxe_gnmi:
        host: "{{ ansible_host }}"
        port: "{{ gnmi_port }}"
        username: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        ca_cert: "{{ gnmi_ca_cert }}"
        operation: get
        encoding: "{{ gnmi_encoding }}"
        paths:
          - /system/config/hostname
      register: hostname_result

    - name: Display hostname
      debug:
        msg: "✓ {{ inventory_hostname }}: {{ hostname_result.data['/system/config/hostname'] }}"

    - name: Get memory statistics (Cisco native model)
      cisco.iosxe_gnmi.cisco_iosxe_gnmi:
        host: "{{ ansible_host }}"
        port: "{{ gnmi_port }}"
        username: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        ca_cert: "{{ gnmi_ca_cert }}"
        operation: get
        encoding: "{{ gnmi_encoding }}"
        origin: rfc7951
        paths:
          - /Cisco-IOS-XE-memory-oper:memory-statistics/memory-statistic
      register: memory_result

    - name: Display memory summary
      debug:
        msg: |
          ✓ {{ inventory_hostname }} Memory:
          {% for key, pool in memory_result.data.items() %}
          {% if pool.name == 'Processor' %}
            Processor: {{ ((pool['used-memory'] | int / pool['total-memory'] | int) * 100) | round(1) }}% used ({{ (pool['used-memory'] | int / 1048576) | round(0) }}MB / {{ (pool['total-memory'] | int / 1048576) | round(0) }}MB)
          {% endif %}
          {% endfor %}

    - name: Get interface count
      cisco.iosxe_gnmi.cisco_iosxe_gnmi:
        host: "{{ ansible_host }}"
        port: "{{ gnmi_port }}"
        username: "{{ gnmi_username }}"
        password: "{{ gnmi_password }}"
        ca_cert: "{{ gnmi_ca_cert }}"
        operation: get
        encoding: "{{ gnmi_encoding }}"
        paths:
          - /interfaces/interface/config/name
        datatype: config
      register: interfaces_result

    - name: Display interface summary
      debug:
        msg: "✓ {{ inventory_hostname }}: {{ interfaces_result.data | length }} interfaces configured"

- name: Summary Report
  hosts: localhost
  gather_facts: false
  run_once: true
  tasks:
    - name: Display summary
      debug:
        msg:
          - "================================"
          - "Multi-Device gNMI Test Complete"
          - "================================"
          - "Tested {{ groups['iosxe_devices'] | length }} devices successfully"
          - "All devices responding via gNMI"
          - "================================"
